services:
  # API service
  api:
    build: .
    container_name: paperlens-api
    ports:
      - "8585:8585"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Container specific overrides (if needed)
      - POSTGRES_DATABASE_URL=postgresql+asyncpg://paperlens_user:paperlens_password@postgres:5432/paperlens_db
      - OPENSEARCH__HOST=http://opensearch:9200
      - OLLAMA_HOST=http://ollama:11434
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8585/api/v1/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - paperlens-network

  # Database service
  postgres:
    image: postgres:17-alpine
    container_name: paperlens-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=paperlens_db
      - POSTGRES_USER=paperlens_user
      - POSTGRES_PASSWORD=paperlens_password
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h localhost",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - paperlens-network

  # Airflow service
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: paperlens-airflow
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Airflow-specific environment setup
      - AIRFLOW_HOME=/opt/airflow
      - PYTHONPATH=/opt/airflow/src

      # Container hostnames for Airflow
      - POSTGRES_DATABASE_URL=postgresql+psycopg2://paperlens_user:paperlens_password@postgres:5432/paperlens_db
      - OPENSEARCH__HOST=http://opensearch:9200
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - paperlens-network

  # OpenSearch service
  opensearch:
    image: opensearchproject/opensearch:3
    container_name: paperlens-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
      - "9600:9600"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - paperlens-network

  # OpenSearch Dashboards service
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3
    container_name: paperlens-opensearch-dashboards
    depends_on:
      - opensearch
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - paperlens-network

  # Ollama service
  ollama:
    image: ollama/ollama:latest
    container_name: paperlens-ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - paperlens-network

# Volumes
volumes:
  postgres_data:
  opensearch_data:
  ollama_data:
  airflow_logs:

# Networks
networks:
  paperlens-network:
    driver: bridge
